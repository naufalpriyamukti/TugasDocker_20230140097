<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Form Input Mahasiswa</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .form-container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 400px; }
        h2 { text-align: center; color: #333; margin-bottom: 20px; }
        label { font-weight: bold; color: #555; }
        input[type="text"] { width: 100%; padding: 10px; margin: 8px 0 20px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .radio-group { margin: 10px 0 20px 0; }
        .radio-group input { margin-right: 5px; }
        .radio-group label { font-weight: normal; margin-right: 15px; }
        button { width: 100%; background-color: #0d6efd; color: white; padding: 10px; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; transition: 0.3s; margin-bottom: 10px; }
        button:hover { background-color: #0b5ed7; }
        .back-link { display: block; text-align: center; color: #6c757d; text-decoration: none; font-size: 14px; }
        .back-link:hover { color: #343a40; text-decoration: underline; }
    </style>
</head>
<body>
<div class="form-container">
    <h2>Form Input Mahasiswa</h2>

    <form th:action="@{/submit}" th:object="${user}" method="post">
        <label>Nama:</label>
        <input type="text" th:field="*{nama}" placeholder="Masukkan Nama Lengkap" required>

        <label>NIM:</label>
        <input type="text" th:field="*{nim}" placeholder="Masukkan NIM" required>

        <label>Jenis Kelamin:</label>
        <div class="radio-group">
            <input type="radio" th:field="*{jenisKelamin}" value="Laki-laki" id="laki" required>
            <label for="laki">Laki-laki</label>

            <input type="radio" th:field="*{jenisKelamin}" value="Perempuan" id="perempuan" required>
            <label for="perempuan">Perempuan</label>
        </div>

        <button type="submit">Submit Data</button>
    </form>
    <a th:href="@{/home}" class="back-link">← Kembali ke Home</a>
</div>
</body>
</html>
